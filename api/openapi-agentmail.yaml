openapi: 3.1.0
info:
  title: API Reference
  version: 1.0.0
paths:
  /v0/agent/sign-up:
    post:
      operationId: sign-up
      summary: Sign Up
      description: >-
        Create a new agent organization with an inbox and API key. A 6-digit OTP is sent to the human's email for
        verification.


        This endpoint is idempotent. Calling it again with the same `human_email` will rotate the API key and resend the
        OTP if expired.


        The returned API key has limited permissions until the organization is verified via the verify endpoint.
      tags:
        - subpackage_agent
      responses:
        '200':
          description: Response with status 200
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_agent_AgentSignupResponse'
        '400':
          description: Error response with status 400
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type__ValidationErrorResponse'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/type_agent_AgentSignupRequest'
  /v0/agent/verify:
    post:
      operationId: verify
      summary: Verify
      description: >-
        Verify an agent organization using the 6-digit OTP sent to the human's email during sign-up.


        On success, the organization is upgraded from `agent_unverified` to `agent_verified`, the send allowlist is
        removed, and free plan entitlements are applied.


        The OTP expires after 24 hours and allows a maximum of 10 attempts.
      tags:
        - subpackage_agent
      parameters:
        - name: Authorization
          in: header
          description: Bearer authentication
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response with status 200
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_agent_AgentVerifyResponse'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/type_agent_AgentVerifyRequest'
