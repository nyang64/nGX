openapi: 3.1.0

info:
  title: nGX API (Codex Reconstruction)
  version: 1.0.0
  description: |
    Best-effort reconstructed Codex variant written after the original Codex
    edits were overwritten. This file is intended as a comparison reference
    against the current `openapi.yaml`, not as a byte-for-byte recovery.

    Email infrastructure purpose-built for AI agents.

    nGX lets you provision inboxes, send and receive email, manage
    drafts, and subscribe to real-time events via webhooks or WebSockets.

    ## Authentication
    All API requests (except `/health`) require a Bearer API key in the
    `Authorization` header:
    ```
    Authorization: Bearer am_live_...
    ```
    Keys are scoped — see the `scopes` field on the API key endpoints.

    ## Organization And Keys
    Organizations are created during account signup and are discovered at runtime
    via the authenticated API key. `GET /organizations` returns the current organization
    for that key.

    `POST /api-keys` creates additional API keys for the current organization.
    It does not create a new organization or perform account registration.
  contact:
    name: nGX Support
    url: https://yourdomain.com

servers:
  - url: https://api.yourdomain.com/v1
    description: Production
  - url: http://localhost:8080/v1
    description: Local development

security:
  - BearerAuth: []

# ---------------------------------------------------------------------------
# Tags
# ---------------------------------------------------------------------------
tags:
  - name: Organizations
    description: Manage your nGX organization.
  - name: Pods
    description: Logical groupings of inboxes within an organization.
  - name: Inboxes
    description: Email addresses managed by nGX.
  - name: Threads
    description: Conversation threads made up of related messages.
  - name: Messages
    description: Individual email messages within threads.
  - name: Drafts
    description: Composed messages awaiting review or sending.
  - name: Webhooks
    description: HTTP callbacks for real-time event delivery.
  - name: API Keys
    description: Programmatic access credentials.
  - name: Domains
    description: Custom domains used for inbox provisioning and sending.
  - name: Realtime
    description: WebSocket connection for streaming events.

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # -------------------------------------------------------------------------
  # Organization
  # -------------------------------------------------------------------------
  /organizations:
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get the current organization
      description: Returns the organization associated with the authenticated API key.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
    patch:
      tags: [Organizations]
      operationId: updateOrganization
      summary: Update the current organization
      description: Updates properties of the organization associated with the authenticated API key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  # -------------------------------------------------------------------------
  # Pods
  # -------------------------------------------------------------------------
  /pods:
    get:
      tags: [Pods]
      operationId: listPods
      summary: List pods
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/pageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PodList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Pods]
      operationId: createPod
      summary: Create a pod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePodRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pod"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalError" }

  /pods/{podId}:
    parameters:
      - $ref: "#/components/parameters/podId"
    get:
      tags: [Pods]
      operationId: getPod
      summary: Get a pod
      responses:
        "200":
          description: OK
