      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inbox"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Inboxes]
      operationId: deleteInbox
      summary: Delete an inbox
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  # -------------------------------------------------------------------------
  # Threads (nested under inboxes)
  # -------------------------------------------------------------------------
  /inboxes/{inboxId}/threads:
    parameters:
      - $ref: "#/components/parameters/inboxId"
    get:
      tags: [Threads]
      operationId: listThreads
      summary: List threads in an inbox
      parameters:
        - name: unread
          in: query
          schema:
            type: boolean
        - name: starred
          in: query
          schema:
            type: boolean
        - name: label
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/pageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/threads/{threadId}:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/threadId"
    get:
      tags: [Threads]
      operationId: getThread
      summary: Get a thread
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thread"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    patch:
      tags: [Threads]
      operationId: updateThread
      summary: Update thread metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateThreadRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thread"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  # -------------------------------------------------------------------------
  # Messages (doubly-nested under inboxes/threads)
  # -------------------------------------------------------------------------
  /inboxes/{inboxId}/threads/{threadId}/messages:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/threadId"
    get:
      tags: [Messages]
      operationId: listMessages
      summary: List messages in a thread
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/pageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/threads/{threadId}/messages/{messageId}:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/threadId"
      - $ref: "#/components/parameters/messageId"
    get:
      tags: [Messages]
      operationId: getMessage
      summary: Get a message
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    patch:
      tags: [Messages]
      operationId: updateMessage
      summary: Update message metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/threads/{threadId}/messages/{messageId}/reply-all:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/threadId"
      - $ref: "#/components/parameters/messageId"
    post:
      tags: [Messages]
      operationId: replyAllMessage
      summary: Reply all to a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyMessageRequest"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/threads/{threadId}/messages/{messageId}/forward:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/threadId"
      - $ref: "#/components/parameters/messageId"
    post:
      tags: [Messages]
      operationId: forwardMessage
      summary: Forward a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardMessageRequest"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/threads/{threadId}/messages/{messageId}/raw:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/threadId"
      - $ref: "#/components/parameters/messageId"
    get:
      tags: [Messages]
      operationId: getRawMessage
      summary: Get the raw RFC 5322 source for a message
      responses:
        "200":
          description: OK
          content:
            message/rfc822:
              schema:
                type: string
                example: "From: sender@example.com\r\nTo: inbox@example.com\r\nSubject: Hello\r\n\r\nRaw message body"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/threads/{threadId}/messages/{messageId}/attachments/{attachmentId}:
    parameters:
