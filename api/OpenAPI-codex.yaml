          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  # -------------------------------------------------------------------------
  # Drafts (nested under inboxes)
  # -------------------------------------------------------------------------
  /inboxes/{inboxId}/drafts:
    parameters:
      - $ref: "#/components/parameters/inboxId"
    get:
      tags: [Drafts]
      operationId: listDrafts
      summary: List drafts in an inbox
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/pageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Drafts]
      operationId: createDraft
      summary: Create a draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDraftRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/drafts/{draftId}:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/draftId"
    get:
      tags: [Drafts]
      operationId: getDraft
      summary: Get a draft
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    patch:
      tags: [Drafts]
      operationId: updateDraft
      summary: Update a draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDraftRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Drafts]
      operationId: deleteDraft
      summary: Delete a draft
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/drafts/{draftId}/approve:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/draftId"
    post:
      tags: [Drafts]
      operationId: approveDraft
      summary: Approve a draft
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /inboxes/{inboxId}/drafts/{draftId}/reject:
    parameters:
      - $ref: "#/components/parameters/inboxId"
      - $ref: "#/components/parameters/draftId"
    post:
      tags: [Drafts]
      operationId: rejectDraft
      summary: Reject a draft
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  # -------------------------------------------------------------------------
  # Webhooks
  # -------------------------------------------------------------------------
  /webhooks:
    get:
