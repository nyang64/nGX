      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/pageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Webhooks]
      operationId: createWebhook
      summary: Create a webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalError" }

  /webhooks/{webhookId}:
    parameters:
      - $ref: "#/components/parameters/webhookId"
    get:
      tags: [Webhooks]
      operationId: getWebhook
      summary: Get a webhook
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    patch:
      tags: [Webhooks]
      operationId: updateWebhook
      summary: Update a webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebhookRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Webhooks]
      operationId: deleteWebhook
      summary: Delete a webhook
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /webhooks/{webhookId}/deliveries:
    parameters:
      - $ref: "#/components/parameters/webhookId"
    get:
      tags: [Webhooks]
      operationId: listWebhookDeliveries
      summary: List webhook deliveries
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveryList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  # -------------------------------------------------------------------------
  # API Keys
  # -------------------------------------------------------------------------
  /api-keys:
    get:
      tags: [API Keys]
      operationId: listAPIKeys
      summary: List API keys
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [API Keys]
      operationId: createAPIKey
      summary: Create an API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api-keys/{keyId}:
    parameters:
      - $ref: "#/components/parameters/keyId"
    get:
      tags: [API Keys]
      operationId: getAPIKey
      summary: Get an API key
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKey"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [API Keys]
      operationId: revokeAPIKey
      summary: Revoke an API key
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  # -------------------------------------------------------------------------
  # WebSocket
  # -------------------------------------------------------------------------
  /ws:
    get:
      tags: [Realtime]
      operationId: connectWebSocket
      summary: Open a WebSocket connection
      description: |
        Upgrades to a WebSocket connection for real-time event streaming.

        Authentication is via the `token` query parameter (Bearer API key).

        Once connected, the server pushes JSON event envelopes whenever
        something occurs in your org (messages received, drafts created,
        thread status changed, etc.).

        **Event envelope structure:**
        ```json
        {
          "id": "01J...",
          "type": "message.received",
          "org_id": "...",
          "occurred_at": "2025-01-01T00:00:00Z",
          "data": { ... }
        }
        ```

        Send a JSON ping frame to keep the connection alive:
        ```json
        { "type": "ping" }
        ```
        The server responds with `{ "type": "pong" }`.
      parameters:
        - name: token
          in: query
          required: true
          description: Bearer API key for authentication.
          schema:
            type: string
            example: "am_live_..."
      responses:
        "101":
          description: Switching Protocols — WebSocket connection established.
        "401": { $ref: "#/components/responses/Unauthorized" }

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "API Key (am_live_...)"
      description: |
        All API requests require a Bearer API key.
        Keys can be scoped to specific capabilities and pods.

  # -------------------------------------------------------------------------
  # Parameters
  # -------------------------------------------------------------------------
  parameters:
    orgId:
      name: orgId
      in: path
      required: true
      description: Organization ID.
      schema:
        type: string

    podId:
      name: podId
      in: path
      required: true
      description: Pod ID.
      schema:
        type: string

    inboxId:
      name: inboxId
      in: path
      required: true
      description: Inbox ID.
      schema:
        type: string

    threadId:
      name: threadId
      in: path
      required: true
      description: Thread ID.
      schema:
        type: string

    messageId:
      name: messageId
      in: path
      required: true
      description: Message ID.
      schema:
        type: string

    draftId:
      name: draftId
      in: path
      required: true
      description: Draft ID.
      schema:
        type: string

    webhookId:
      name: webhookId
      in: path
      required: true
      description: Webhook ID.
      schema:
        type: string

    keyId:
      name: keyId
      in: path
      required: true
      description: API key ID.
      schema:
        type: string

    domainId:
      name: domainId
      in: path
      required: true
      description: Domain ID.
      schema:
        type: string

    attachmentId:
      name: attachmentId
      in: path
      required: true
      description: Attachment ID.
      schema:
        type: string

    limit:
      name: limit
      in: query
      description: Maximum number of items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    pageToken:
      name: page_token
      in: query
      description: Opaque page token from a previous response.
      schema:
        type: string

  # -------------------------------------------------------------------------
  # Responses
  # -------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Bad Request — invalid parameters or request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "validation failed"
            details:
              field: "url"
              reason: "must be a valid https URL"

    Unauthorized:
      description: Unauthorized — missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "missing or invalid authorization header"

    Forbidden:
      description: Forbidden — authenticated but insufficient scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "insufficient scope"

    NotFound:
      description: Not Found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "not found"

    Conflict:
      description: Conflict — resource already exists or state transition is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "email address already registered"

    RateLimited:
      description: Too Many Requests.
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "rate limit exceeded"

    InternalError:
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "internal server error"

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:

    # --- Primitives / shared --------------------------------------------------

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
          example: "not found"
        details:
          type: object
          description: Optional structured error details (validation errors, etc.).
          additionalProperties: true
      example:
        error: "not found"
        details:
          resource: "thread"
          id: "9b6ba4f5-9f7d-4f56-b0ec-f3a0d5f3a201"

    OperationStatus:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        resource:
          type: string
        id:
          type: string
          format: uuid
      example:
        success: true
        message: "resource deleted"
        resource: "inbox"
        id: "3f2d9d77-89b9-4b8f-9f47-d0b78664b6cb"

    EmailAddress:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: "alice@example.com"
        name:
          type: string
          example: "Alice Smith"

    # --- Enums ----------------------------------------------------------------

    ThreadStatus:
      type: string
      enum: [open, closed, spam, trash]
      description: Lifecycle status of a thread.

    MessageStatus:
      type: string
      enum: [received, sending, sent, failed, bounced]

    MessageDirection:
      type: string
      enum: [inbound, outbound]

    DraftReviewStatus:
      type: string
      enum: [pending, approved, rejected, sent]

    InboxStatus:
      type: string
      enum: [active, suspended, deleted]

    WebhookDeliveryStatus:
      type: string
      enum: [pending, success, failed, retrying]

    # --- Organization ---------------------------------------------------------

    Organization:
      type: object
      required: [organization_id, inbox_count, domain_count, created_at, updated_at]
      properties:
        organization_id:
          type: string
        display_name:
          type: string
          nullable: true
        inbox_count:
          type: integer
        domain_count:
          type: integer
        inbox_limit:
          type: integer
          nullable: true
        domain_limit:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        organization_id: "org_123"
        display_name: "Acme Corp"
        inbox_count: 12
        domain_count: 3
        inbox_limit: 25
        domain_limit: 10
        created_at: "2026-03-27T18:30:00Z"
        updated_at: "2026-03-27T18:30:00Z"

    UpdateOrganizationRequest:
      type: object
      properties:
        display_name:
          type: string
          description: Human-readable display name for the organization.

    # --- Pod ------------------------------------------------------------------

    Pod:
      type: object
      required: [pod_id, name, client_id, created_at, updated_at]
      properties:
        pod_id:
          type: string
        name:
          type: string
          example: "Customer Support"
        client_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        pod_id: "pod_123"
        name: "Customer Support"
        client_id: "client_123"
        created_at: "2026-03-27T18:31:00Z"
        updated_at: "2026-03-27T18:31:00Z"

    PodList:
      type: object
      required: [count, pods]
      properties:
        count:
          type: integer
        pods:
          type: array
          items:
            $ref: "#/components/schemas/Pod"
        limit:
          type: integer
          nullable: true
        next_page_token:
          type: string
          nullable: true
      example:
        count: 1
        pods:
          - pod_id: "pod_123"
            name: "Customer Support"
            client_id: "client_123"
            created_at: "2026-03-27T18:31:00Z"
            updated_at: "2026-03-27T18:31:00Z"
        limit: 20
        next_page_token: null

    CreatePodRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "Customer Support"
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9-]+$"
          example: "customer-support"
        description:
          type: string
          maxLength: 1000
        settings:
          type: object
          additionalProperties: true

    UpdatePodRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        settings:
          type: object
          additionalProperties: true

    # --- Inbox ----------------------------------------------------------------

    Inbox:
      type: object
      required: [inbox_id, display_name, client_id, created_at, updated_at]
      properties:
        inbox_id:
          type: string
          example: "support@example.com"
        pod_id:
          type: string
          nullable: true
        domain_id:
          type: string
          nullable: true
        display_name:
          type: string
        client_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        inbox_id: "support@example.com"
        pod_id: "pod_123"
        domain_id: null
        display_name: "Acme Support"
        client_id: "client_123"
        created_at: "2026-03-27T18:32:00Z"
        updated_at: "2026-03-27T18:32:00Z"

    InboxList:
      type: object
      required: [count, inboxes]
      properties:
        count:
          type: integer
        inboxes:
          type: array
          items:
            $ref: "#/components/schemas/Inbox"
        limit:
          type: integer
          nullable: true
        next_page_token:
          type: string
          nullable: true
      example:
        count: 1
        inboxes:
          - inbox_id: "support@example.com"
            pod_id: "pod_123"
            domain_id: null
            display_name: "Acme Support"
            client_id: "client_123"
            created_at: "2026-03-27T18:32:00Z"
            updated_at: "2026-03-27T18:32:00Z"
        limit: 20
        next_page_token: null

    CreateInboxRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
        domain:
          type: string
          description: Domain to provision under, e.g. `mail.yourdomain.com` or a verified custom domain.
        pod_id:
          type: string
        display_name:
          type: string
        name:
          type: string
          description: Alias for display name used by some SDKs.

    UpdateInboxRequest:
      type: object
      properties:
        display_name:
          type: string
        pod_id:
          type: string
          nullable: true

    # --- Thread ---------------------------------------------------------------

    Thread:
      type: object
      required: [thread_id, inbox_id, created_at, updated_at]
      properties:
        thread_id:
          type: string
        inbox_id:
          type: string
        subject:
          type: string
        preview:
          type: string
        labels:
          type: array
          items:
            type: string
        message_count:
          type: integer
        unread:
          type: boolean
        starred:
          type: boolean
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        thread_id: "thread_123"
        inbox_id: "support@example.com"
        subject: "Re: Invoice #1234"
        preview: "Hi, I wanted to follow up on the invoice..."
        labels:
          - "urgent"
        message_count: 2
        unread: true
        starred: false
        messages: []
        created_at: "2026-03-27T18:35:00Z"
        updated_at: "2026-03-27T18:40:00Z"

    ThreadList:
      type: object
      required: [count, threads]
      properties:
        count:
          type: integer
        threads:
          type: array
          items:
            $ref: "#/components/schemas/Thread"
        limit:
          type: integer
          nullable: true
        next_page_token:
          type: string
          nullable: true
      example:
        count: 1
        threads:
          - thread_id: "thread_123"
            inbox_id: "support@example.com"
            subject: "Re: Invoice #1234"
            preview: "Hi, I wanted to follow up on the invoice..."
            labels:
              - "urgent"
            message_count: 2
            unread: true
            starred: false
            messages: []
            created_at: "2026-03-27T18:35:00Z"
            updated_at: "2026-03-27T18:40:00Z"
        limit: 20
        next_page_token: null

    UpdateThreadRequest:
      type: object
      properties:
        unread:
          type: boolean
        starred:
          type: boolean
        add_labels:
          type: array
          items:
            type: string
        remove_labels:
          type: array
          items:
            type: string
        status:
          $ref: "#/components/schemas/ThreadStatus"

    # --- Message --------------------------------------------------------------

    Message:
      type: object
      required: [message_id, inbox_id, thread_id, created_at, updated_at]
      properties:
        message_id:
          type: string
        inbox_id:
          type: string
        thread_id:
          type: string
        subject:
          type: string
        from:
          type: string
          description: RFC 5322 from header rendered as a string.
        to:
          type: array
          items:
            type: string
        cc:
          type: array
          items:
            type: string
        bcc:
          type: array
          items:
            type: string
        reply_to:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        labels:
          type: array
          items:
            type: string
        text:
          type: string
        html:
          type: string
        preview:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        message_id: "msg_123"
        inbox_id: "support@example.com"
        thread_id: "thread_123"
        subject: "Re: Invoice #1234"
        from: "Acme Support <support@example.com>"
        to:
          - "Vendor Billing <billing@vendor.com>"
        cc: []
        bcc: []
        reply_to: []
        labels:
          - "urgent"
        text: "Thanks, we have processed the invoice."
        html: "<p>Thanks, we have processed the invoice.</p>"
        preview: "Thanks, we have processed the invoice."
        headers:
          Message-ID: "<msg_123>"
        attachments: []
        created_at: "2026-03-27T18:39:00Z"
        updated_at: "2026-03-27T18:40:00Z"

    MessageList:
      type: object
      required: [count, messages]
      properties:
        count:
          type: integer
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        limit:
          type: integer
          nullable: true
        next_page_token:
          type: string
          nullable: true
      example:
        count: 1
        messages:
          - message_id: "msg_123"
            inbox_id: "support@example.com"
            thread_id: "thread_123"
            subject: "Re: Invoice #1234"
            from: "Acme Support <support@example.com>"
            to:
              - "Vendor Billing <billing@vendor.com>"
            cc: []
            bcc: []
            reply_to: []
            labels:
              - "urgent"
            text: "Thanks, we have processed the invoice."
            html: "<p>Thanks, we have processed the invoice.</p>"
            preview: "Thanks, we have processed the invoice."
            headers:
              Message-ID: "<msg_123>"
            attachments: []
            created_at: "2026-03-27T18:39:00Z"
            updated_at: "2026-03-27T18:40:00Z"
        limit: 20
        next_page_token: null

    SendMessageRequest:
      type: object
      required: [to]
      properties:
        thread_id:
          type: string
          description: If set, this message is associated with an existing thread.
        in_reply_to:
          type: string
        subject:
          type: string
          example: "Re: Invoice #1234"
        to:
          type: array
          minItems: 1
          items:
            type: string
        cc:
          type: array
          items:
            type: string
        bcc:
          type: array
          items:
            type: string
        reply_to:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        text:
          type: string
        html:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentUpload"
        headers:
          type: object
          additionalProperties:
            type: string

    SendMessageResponse:
      type: object
      required: [message_id, thread_id]
      properties:
        message_id:
          type: string
        thread_id:
          type: string
      example:
        message_id: "msg_123"
        thread_id: "thread_123"

    UpdateMessageRequest:
      type: object
      properties:
        add_labels:
          type: array
          items:
            type: string
        remove_labels:
          type: array
          items:
            type: string
        unread:
          type: boolean
        starred:
          type: boolean

    ReplyMessageRequest:
      type: object
      properties:
        add_labels:
          type: array
          items:
            type: string
        remove_labels:
          type: array
          items:
            type: string
        reply_to:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        text:
          type: string
        html:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentUpload"
        headers:
          type: object
          additionalProperties:
            type: string

    ForwardMessageRequest:
      type: object
      required: [to]
