version: "3.9"

# ============================================================
# AgentMail Local Development Infrastructure
# ============================================================
# Services:
#   postgres    - Primary relational database (port 5432)
#   zookeeper   - Kafka coordination service (port 2181)
#   kafka       - Message streaming broker (port 9092)
#   redis       - Cache and pub/sub (port 6379)
#   minio       - S3-compatible object storage (ports 9000, 9001)
#   mailhog     - Local SMTP sink + web UI (ports 1025, 8025)
#   nginx       - Local reverse proxy (port 80)
# ============================================================

networks:
  agentmail:
    driver: bridge
    name: agentmail

volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  infinity_cache:
    driver: local

services:

  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentmail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentmail
      POSTGRES_USER: agentmail
      POSTGRES_PASSWORD: agentmail_dev
      # Tune for local dev – not for production
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmail -d agentmail"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - agentmail

  # ----------------------------------------------------------
  # Zookeeper (required by Kafka)
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: agentmail-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - agentmail

  # ----------------------------------------------------------
  # Apache Kafka 7.6.0 (Confluent Platform)
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: agentmail-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      # Pre-create our topics with correct partition counts
      KAFKA_CREATE_TOPICS: >-
        email.inbound.raw:1:1,
        email.outbound.queue:1:1,
        events.fanout:1:1,
        webhooks.delivery:1:1
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - agentmail

  # ----------------------------------------------------------
  # Redis 7
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agentmail-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - agentmail

  # ----------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: agentmail-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentmail_minio
      MINIO_ROOT_PASSWORD: agentmail_minio_dev_secret
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - agentmail

  # MinIO bucket initializer (runs once then exits)
  minio-init:
    image: minio/mc:latest
    container_name: agentmail-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 agentmail_minio agentmail_minio_dev_secret &&
        mc mb --ignore-existing local/agentmail-emails &&
        mc mb --ignore-existing local/agentmail-attachments &&
        mc anonymous set download local/agentmail-attachments &&
        echo 'MinIO buckets initialized.'
      "
    networks:
      - agentmail

  # ----------------------------------------------------------
  # MailHog (local SMTP sink + web UI)
  # ----------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: agentmail-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI  (http://localhost:8025)
    environment:
      MH_STORAGE: memory
      MH_SMTP_BIND_ADDR: 0.0.0.0:1025
      MH_API_BIND_ADDR: 0.0.0.0:8025
      MH_UI_BIND_ADDR: 0.0.0.0:8025
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - agentmail

  # ----------------------------------------------------------
  # Infinity (local embedding server — nomic-embed-text-v1.5)
  # OpenAI-compatible API at POST /v1/embeddings on port 7997.
  # Model weights are cached in the infinity_cache volume so they
  # are only downloaded on the first startup (~270 MB).
  # ----------------------------------------------------------
  infinity:
    image: michaelf34/infinity:latest
    container_name: agentmail-infinity
    restart: unless-stopped
    command: >
      v2
      --model-id nomic-ai/nomic-embed-text-v1.5
      --port 7997
      --log-level warning
    ports:
      - "7997:7997"
    volumes:
      - infinity_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7997/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s   # model download on first run can take a while
    networks:
      - agentmail

  # ----------------------------------------------------------
  # Nginx (local reverse proxy)
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: agentmail-nginx
    restart: unless-stopped
    depends_on:
      - mailhog
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - agentmail
