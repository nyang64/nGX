# ============================================================
# AgentMail Nginx – Local Development Reverse Proxy
# ============================================================
# Upstreams (all services run as processes on the host, not in
# Docker, during local dev – hence host.docker.internal).
#
#   Port 80   → this nginx
#   /api/*    → API service  (host:8080)
#   /ws       → WebSocket    (host:8080, upgraded)
#   /         → (reserved; add SPA static serving here if needed)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --------------------------------------------------------
    # Logging
    # --------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # --------------------------------------------------------
    # Performance
    # --------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript;

    # --------------------------------------------------------
    # Upstream: API service
    # --------------------------------------------------------
    upstream api_backend {
        # In Docker Compose, services on the agentmail network reach
        # the host machine via host.docker.internal.
        # Replace with the container name (e.g. "agentmail-api:8080")
        # once the API service is containerised.
        server host.docker.internal:8080;
        keepalive 32;
    }

    # --------------------------------------------------------
    # Main server block
    # --------------------------------------------------------
    server {
        listen      80;
        server_name localhost;

        # Maximum upload size (for email attachments)
        client_max_body_size 25m;

        # -------------------------------------------------------
        # Common proxy headers applied to all locations
        # -------------------------------------------------------
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # -------------------------------------------------------
        # Health check endpoint (nginx itself)
        # -------------------------------------------------------
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # -------------------------------------------------------
        # WebSocket upgrade  →  /ws
        # -------------------------------------------------------
        location /ws {
            proxy_pass         http://api_backend;

            # WebSocket upgrade handshake
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Keep WebSocket connections alive longer
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # Disable buffering for real-time messages
            proxy_buffering off;
        }

        # -------------------------------------------------------
        # REST API  →  /api/*
        # -------------------------------------------------------
        location /api/ {
            proxy_pass http://api_backend;

            # Strip /api prefix so the service sees clean paths.
            # Comment out the rewrite below if the API service
            # already expects the /api prefix.
            # rewrite ^/api(/.*)$ $1 break;

            # Buffer responses for non-streaming endpoints
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;

            # CORS pre-flight passthrough (the API handles CORS headers)
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # -------------------------------------------------------
        # Catch-all: 404 for unknown paths
        # -------------------------------------------------------
        location / {
            return 404 '{"error":"not_found","message":"No route matched."}\n';
            add_header Content-Type application/json;
        }

        # -------------------------------------------------------
        # Error pages
        # -------------------------------------------------------
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 502 '{"error":"gateway_error","message":"Upstream service unavailable."}\n';
            add_header Content-Type application/json;
        }
    }
}
